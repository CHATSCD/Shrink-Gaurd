<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shrink Guard v3</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body class="bg-gray-900 text-white p-6">

<h1 class="text-3xl font-bold mb-6 text-center">
Shrink Guard v3
</h1>

<div class="max-w-md mx-auto bg-gray-800 p-6 rounded-xl">

<label>Barcode</label>
<input id="barcode" class="w-full p-2 mb-3 text-black"/>

<button onclick="startScanner()" class="bg-blue-500 w-full p-2 rounded mb-4">
Scan Barcode
</button>

<div id="reader"></div>

<label>Incoming Count</label>
<input id="incoming" type="number" class="w-full p-2 mb-3 text-black"/>

<button onclick="saveIncoming()" class="bg-green-500 w-full p-2 rounded mb-4">
Save Incoming
</button>

<label>Count Out</label>
<input id="countOut" type="number" class="w-full p-2 mb-3 text-black"/>

<button onclick="submitCountOut()" class="bg-red-500 w-full p-2 rounded">
Submit Count Out
</button>

</div>

<script>

// SUPABASE CONFIG
const SUPABASE_URL = "YOUR_SUPABASE_URL"
const SUPABASE_KEY = "YOUR_ANON_KEY"

const supabase = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

// BARCODE SCANNER
function startScanner(){

const scanner = new Html5Qrcode("reader")

scanner.start(
{ facingMode: "environment" },
{
fps: 10,
qrbox: 250
},
(barcode) => {

document.getElementById("barcode").value = barcode

scanner.stop()

}
)

}

// SAVE INCOMING
async function saveIncoming(){

const barcode = document.getElementById("barcode").value
const incoming = document.getElementById("incoming").value

const { error } = await supabase
.from("counts")
.insert([
{
barcode: barcode,
incoming: incoming
}
])

if(error){

alert("Error saving incoming")

}else{

alert("Incoming saved")

}

}

// SUBMIT COUNT OUT
async function submitCountOut(){

const barcode = document.getElementById("barcode").value
const countOut = document.getElementById("countOut").value

// GET INCOMING FIRST

const { data } = await supabase
.from("counts")
.select("*")
.eq("barcode", barcode)
.order("id", { ascending:false })
.limit(1)

const incoming = data[0].incoming
const shrink = incoming - countOut

// UPDATE RECORD

const { error } = await supabase
.from("counts")
.update({
count_out: countOut,
shrink: shrink
})
.eq("id", data[0].id)

if(error){

alert("Error submitting")

}else{

alert("Shrink recorded: " + shrink)

}

}

</script>

</body>
</html>
