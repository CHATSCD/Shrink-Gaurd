<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shrink Guard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body class="bg-gray-900 text-white p-6">

<h1 class="text-3xl font-bold mb-6 text-center">
Shrink Guard
</h1>

<div class="max-w-md mx-auto bg-gray-800 p-6 rounded-xl space-y-3">

<label>Barcode</label>
<input id="barcode" class="w-full p-2 text-black"/>

<button onclick="startScanner()" class="bg-blue-500 w-full p-2 rounded">
Scan Barcode
</button>

<div id="reader"></div>

<label>Previous Shift Sales (PLU)</label>
<input id="sales" type="number" class="w-full p-2 text-black"/>

<label>Location</label>
<select id="location" class="w-full p-2 text-black">
<option>Sales Floor</option>
<option>Office</option>
</select>

<label>Cases</label>
<input id="cases" type="number" class="w-full p-2 text-black"/>

<label>Bottles</label>
<input id="bottles" type="number" class="w-full p-2 text-black"/>

<button onclick="submitCount()" class="bg-green-500 w-full p-2 rounded">
Submit Count
</button>

</div>

<script>

const SUPABASE_URL = "https://ylfsqjbqhewpfiooytlg.supabase.co"

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlsZnNxamJxaGV3cGZpb295dGxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NzQwODQsImV4cCI6MjA4ODM1MDA4NH0.Ssl5J6ktZIVtLd2cq8vH7PWdR4-yZwI5tt4PtXkVqWk"

const supabase = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

function startScanner(){

const scanner = new Html5Qrcode("reader")

scanner.start(
{ facingMode:"environment" },
{ fps:10, qrbox:250 },
barcode => {

document.getElementById("barcode").value = barcode

scanner.stop()

})

}

async function submitCount(){

const barcode = document.getElementById("barcode").value
const sales = parseInt(document.getElementById("sales").value || 0)
const location = document.getElementById("location").value
const cases = parseInt(document.getElementById("cases").value || 0)
const bottles = parseInt(document.getElementById("bottles").value || 0)

const ending = (cases * 12) + bottles

const { error } = await supabase
.from("shift_counts")
.insert([{

barcode: barcode,
location: location,
ending_count: ending,
previous_shift_sales: sales

}])

if(error){

alert("Error saving")

}else{

alert("Count Saved")

}

}

</script>

</body>
</html>
