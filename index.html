const { useState, useEffect, useCallback } = React;

});

const sbFetch = async (token, path, opts = {}) => {
  const r = await fetch(`${SB_URL}${path}`, { headers: sbHeaders(token), ...opts });
  try { return await r.json(); } catch { return null; }
};

const sbQuery  = (token, table, qs = "") => sbFetch(token, `/rest/v1/${table}${qs}`);
const sbInsert = (token, table, data)     => sbFetch(token, `/rest/v1/${table}`, {
  method: "POST",
  headers: { ...sbHeaders(token), Prefer: "return=representation" },
  body: JSON.stringify(data)
});
const sbSignIn = (email, pw) => sbFetch(null, `/auth/v1/token?grant_type=password`, {
  method: "POST", body: JSON.stringify({ email, password: pw })
});
const sbSignOut = (token) => fetch(`${SB_URL}/auth/v1/logout`, { method: "POST", headers: sbHeaders(token) });

// ── Constants ────────────────────────────────────────────────────

  { id:"viva_ultimate",      name:"Viva Zen Ultimate",            case_qty:12 },

];

function EntryTab({ session, store, setStore }) {

    const prod  = PRODUCTS.find(x => x.id === pid);
    const p     = prev[pid] || {};
    const openTotal  = toNum(p.office_btl) + toNum(p.office_cs)*prod.case_qty
                     + toNum(p.floor_btl)  + toNum(p.floor_cs)*prod.case_qty;
    const closeTotal = toNum(counts[pid].office_btl) + toNum(counts[pid].office_cs)*prod.case_qty
                     + toNum(counts[pid].floor_btl)  + toNum(counts[pid].floor_cs)*prod.case_qty;
    const sales    = toNum(counts[pid].sales);
    const expected = openTotal - sales;
    const variance = expected - closeTotal;
    return { openTotal, closeTotal, sales, expected, variance };
  };

  const totalLoss = PRODUCTS.reduce((s,p) => { const v=calcVar(p.id); return v.variance>0?s+v.variance:s; }, 0);

  const handleSubmit = () => {
    if (!employee.trim()) { setError("Enter employee name."); return; }
    setError(""); setShowPin(true); setPin(""); setPinErr("");
  };

  const handlePinDigit = async (d) => {
    const np = pin + d;
    setPin(np);
    if (np.length === 4) {
      if (np !== CORRECT_PIN) { setPinErr("Incorrect PIN. Try again."); setPin(""); return; }
      setShowPin(false);
      await doSave();
    }
  };

  const doSave = async () => {
    setSaving(true);
    const rows = PRODUCTS.map(prod => {
      const v = calcVar(prod.id);
      return {
        store, shift, date, employee,
        product_id:      prod.id,
        open_total:      v.openTotal,
        sales:           v.sales,
        expected:        v.expected,
        close_office_btl: toNum(counts[prod.id].office_btl),
        close_office_cs:  toNum(counts[prod.id].office_cs),
        close_floor_btl:  toNum(counts[prod.id].floor_btl),
        close_floor_cs:   toNum(counts[prod.id].floor_cs),
        close_total:     v.closeTotal,
        variance:        v.variance,
        created_at:      new Date().toISOString(),
      };
    });
    const res = await sbInsert(session.token, "shrink_counts", rows);
    setSaving(false);
    if (Array.isArray(res) || !res?.message) {
      setSaved(true); setTimeout(()=>setSaved(false), 3000);
      setCounts(blankCounts()); setEmployee("");
      // Reload prev
      const data = await sbQuery(session.token, "shrink_counts",
        `?store=eq.${encodeURIComponent(store)}&order=created_at.desc&limit=100`);
      if (Array.isArray(data)) {
        const p = {};
        for (const prod of PRODUCTS) {
          const last = data.find(r => r.product_id === prod.id);
          if (last) p[prod.id] = { office_btl:last.close_office_btl, office_cs:last.close_office_cs, floor_btl:last.close_floor_btl, floor_cs:last.close_floor_cs };
        }
        setPrev(p);
      }
    } else {
      setError("Save failed: " + (res.message || "Unknown error"));
    }
  };

  return (
    <div>
      {/* PIN Modal */}
      {showPin && (
        <div className="modal-overlay">
          <div className="modal">
            <div className="modal-title">Manager Approval</div>
            <div className="modal-sub">Enter 4-digit PIN to submit count</div>
            {pinErr && <div className="error-msg">{pinErr}</div>}
            <div className="pin-dots">
              {[0,1,2,3].map(i => <div key={i} className={`pin-dot ${i<pin.length?"filled":""}`} />)}
            </div>
            <div className="pin-pad">
              {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((d,i) => (
                <button key={i} className="pin-btn"
                  style={d===""?{visibility:"hidden"}:{}}
                  onClick={() => {
                    if (d==="⌫") setPin(p=>p.slice(0,-1));
                    else if (d!=="") handlePinDigit(String(d));
                  }}>
                  {d}
                </button>
              ))}
            </div>
            <div style={{marginTop:16}}>
              <button className="btn btn-ghost btn-full" onClick={()=>setShowPin(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      <div className="page-header">
        <div>
          <div className="page-title">New Count Entry</div>
          <div className="page-sub">Previous closing count auto-loads as opening</div>
        </div>
      </div>

      {error && <div className="error-msg">{error}</div>}
      {saved && <div className="success-msg">✓ Count saved successfully!</div>}

      {/* Shift meta */}
      <div className="card">
        <div className="card-body">
          <div className="shift-meta">
            <div className="form-group" style={{margin:0}}>
              <label className="form-label">Store</label>
              <select className="form-input form-select" value={store} onChange={e=>setStore(e.target.value)}>
                {STORES.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div className="form-group" style={{margin:0}}>
              <label className="form-label">Date</label>
              <input className="form-input" type="date" value={date} onChange={e=>setDate(e.target.value)} />
            </div>
            <div className="form-group" style={{margin:0}}>
              <label className="form-label">Shift</label>
              <select className="form-input form-select" value={shift} onChange={e=>setShift(e.target.value)}>
                {SHIFTS.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div className="form-group" style={{margin:0}}>
              <label className="form-label">Employee</label>
              <input className="form-input" type="text" value={employee} placeholder="Full name"
                onChange={e=>setEmployee(e.target.value)} />
            </div>
          </div>
          {totalLoss > 0 && (
            <div className="alert-banner">
              <span style={{fontSize:20}}>⚠️</span>
              <span>Total shrink this entry: <strong>{totalLoss} bottles</strong> across all products</span>
            </div>
          )}
        </div>
      </div>

      {/* Product cards */}
      {PRODUCTS.map(prod => {
        const p = prev[prod.id] || {};
        const v = calcVar(prod.id);
        const hasCounts = counts[prod.id].office_btl !== "" || counts[prod.id].floor_btl !== "";
        return (
          <div key={prod.id} className="product-card">
            <div className="product-card-header">
              <span className="product-card-name">{prod.name}</span>
              {hasCounts && (
                <span className={`product-card-variance ${v.variance>0?"neg":v.variance<0?"pos":""}`}>
                  {v.variance===0 ? "✓ No Variance" : v.variance>0 ? `−${v.variance} btl` : `+${Math.abs(v.variance)} btl`}
                </span>
              )}
            </div>
            <div className="product-card-body">
              <div className="count-sections">
                {/* Office */}
                <div>
                  <div className="count-section-title">📦 Office / Backroom</div>
                  <div className="count-row">
                    <div className="count-input-wrap"><label>Opening Btl</label><div className="opening-display">{p.office_btl ?? "—"}</div></div>
                    <div className="count-input-wrap"><label>Closing Btl</label>
                      <input className="count-input" type="number" min="0" value={counts[prod.id].office_btl} placeholder="0"
                        onChange={e=>upd(prod.id,"office_btl",e.target.value)} />
                    </div>
                  </div>
                  <div className="count-row">
                    <div className="count-input-wrap"><label>Opening Cs</label><div className="opening-display">{p.office_cs ?? "—"}</div></div>
                    <div className="count-input-wrap"><label>Closing Cs</label>
                      <input className="count-input" type="number" min="0" value={counts[prod.id].office_cs} placeholder="0"
                        onChange={e=>upd(prod.id,"office_cs",e.target.value)} />
                    </div>
                  </div>
                </div>
                {/* Floor */}
                <div>
                  <div className="count-section-title">🏪 Sales Floor</div>
                  <div className="count-row">
                    <div className="count-input-wrap"><label>Opening Btl</label><div className="opening-display">{p.floor_btl ?? "—"}</div></div>
                    <div className="count-input-wrap"><label>Closing Btl</label>
                      <input className="count-input" type="number" min="0" value={counts[prod.id].floor_btl} placeholder="0"
                        onChange={e=>upd(prod.id,"floor_btl",e.target.value)} />
                    </div>
                  </div>
                  <div className="count-row">
                    <div className="count-input-wrap"><label>Opening Cs</label><div className="opening-display">{p.floor_cs ?? "—"}</div></div>
                    <div className="count-input-wrap"><label>Closing Cs</label>
                      <input className="count-input" type="number" min="0" value={counts[prod.id].floor_cs} placeholder="0"
                        onChange={e=>upd(prod.id,"floor_cs",e.target.value)} />
                    </div>
                  </div>
                </div>
              </div>
              {/* Sales + Variance */}
              <div style={{marginTop:14,display:"flex",alignItems:"flex-start",gap:14,flexWrap:"wrap"}}>
                <div style={{minWidth:160}}>
                  <div className="count-section-title">Register Sales</div>
                  <input className="count-input" type="number" min="0" value={counts[prod.id].sales} placeholder="Units sold"
                    onChange={e=>upd(prod.id,"sales",e.target.value)} />
                </div>
                {hasCounts && (
                  <div className="variance-summary" style={{flex:1,minWidth:200}}>
                    <div className="variance-item">Open: <b>{v.openTotal}</b></div>
                    <div className="variance-item">Sales: <b>{v.sales}</b></div>
                    <div className="variance-item">Expected: <b>{v.expected}</b></div>
                    <div className={`variance-item ${v.variance>0?"loss":v.variance<0?"gain":""}`}>
                      Variance: <b>{v.variance>0?`−${v.variance}`:v.variance<0?`+${Math.abs(v.variance)}`:"0"}</b>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      })}

      <div className="submit-row">
        <button className="btn btn-primary" onClick={handleSubmit} disabled={saving}
          style={{padding:"14px 32px",fontSize:17}}>
          {saving ? "Saving…" : "Submit Count — Requires PIN"}
        </button>
      </div>
    </div>
  );
}

// ── Log Tab ──────────────────────────────────────────────────────
function LogTab({ session, store, setStore }) {
  const [logs,    setLogs]    = useState([]);
  const [loading, setLoading] = useState(true);
  const [shiftF,  setShiftF]  = useState("All");
  const [prodF,   setProdF]   = useState("All");
  const [dateF,   setDateF]   = useState("");

  useEffect(() => {
    (async () => {
      setLoading(true);
      const data = await sbQuery(session.token, "shrink_counts",
        `?store=eq.${encodeURIComponent(store)}&order=created_at.desc&limit=300`);
      setLogs(Array.isArray(data) ? data : []);
      setLoading(false);
    })();
  }, [store]);

  const filtered = logs.filter(r =>
    (shiftF==="All" || r.shift===shiftF) &&
    (prodF==="All"  || r.product_id===prodF) &&
    (!dateF || r.date===dateF)
  );

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">Count Log</div>
          <div className="page-sub">{filtered.length} entries · {store}</div>
        </div>
        <select className="form-input form-select" style={{width:160}} value={store} onChange={e=>setStore(e.target.value)}>
          {STORES.map(s=><option key={s}>{s}</option>)}
        </select>
      </div>
      <div className="card">
        <div className="card-body">
          <div className="log-filters">
            <select className="form-input form-select" style={{width:140}} value={shiftF} onChange={e=>setShiftF(e.target.value)}>
              <option value="All">All Shifts</option>
              {SHIFTS.map(s=><option key={s}>{s}</option>)}
            </select>
            <select className="form-input form-select" style={{width:220}} value={prodF} onChange={e=>setProdF(e.target.value)}>
              <option value="All">All Products</option>
              {PRODUCTS.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
            <input className="form-input" type="date" value={dateF} onChange={e=>setDateF(e.target.value)} style={{width:160}} />
            {(shiftF!=="All"||prodF!=="All"||dateF) && (
              <button className="btn btn-ghost btn-sm" onClick={()=>{setShiftF("All");setProdF("All");setDateF("");}}>Clear</button>
            )}
          </div>
          {loading ? <div className="loading">Loading…</div> : filtered.length===0 ? (
            <div className="empty-state"><div className="empty-icon">📋</div><p>No records found</p></div>
          ) : (
            <div className="table-wrap">
              <table>
                <thead><tr>
                  <th>Date</th><th>Shift</th><th>Product</th><th>Employee</th>
                  <th>Open</th><th>Sales</th><th>Expected</th><th>Actual</th><th>Variance</th>
                </tr></thead>
                <tbody>
                  {filtered.map((r,i) => (
                    <tr key={i}>
                      <td>{fmtDate(r.date)}</td>
                      <td><span className="badge badge-shift">{r.shift}</span></td>
                      <td style={{fontWeight:500}}>{PRODUCTS.find(p=>p.id===r.product_id)?.name || r.product_id}</td>
                      <td>{r.employee}</td>
                      <td>{r.open_total}</td>
                      <td>{r.sales}</td>
                      <td>{r.expected}</td>
                      <td>{r.close_total}</td>
                      <td>
                        {r.variance===0
                          ? <span className="badge badge-ok">✓ 0</span>
                          : r.variance>0
                            ? <span className="badge badge-loss">−{r.variance}</span>
                            : <span className="badge badge-ok">+{Math.abs(r.variance)}</span>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Analytics Tab ────────────────────────────────────────────────
function AnalyticsTab({ session, store, setStore }) {
  const [logs,    setLogs]    = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      setLoading(true);
      const data = await sbQuery(session.token, "shrink_counts",
        `?store=eq.${encodeURIComponent(store)}&order=created_at.desc&limit=1000`);
      setLogs(Array.isArray(data) ? data : []);
      setLoading(false);
    })();
  }, [store]);

  const totalLoss   = logs.reduce((s,r) => r.variance>0 ? s+r.variance : s, 0);
  const days        = new Set(logs.map(r=>r.date)).size;
  const avgDaily    = days > 0 ? (totalLoss/days).toFixed(1) : 0;
  const estDollar   = (totalLoss * 12).toFixed(2);

  const byProduct = PRODUCTS.map(p => ({
    ...p,
    loss: logs.filter(r=>r.product_id===p.id&&r.variance>0).reduce((s,r)=>s+r.variance,0)
  })).sort((a,b)=>b.loss-a.loss);
  const maxProd = Math.max(...byProduct.map(p=>p.loss), 1);

  const byShift = SHIFTS.map(s => ({
    shift:s,
    loss: logs.filter(r=>r.shift===s&&r.variance>0).reduce((s2,r)=>s2+r.variance,0)
  }));
  const maxShift = Math.max(...byShift.map(s=>s.loss), 1);

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">Analytics</div>
          <div className="page-sub">Shrink trends · {store}</div>
        </div>
        <select className="form-input form-select" style={{width:160}} value={store} onChange={e=>setStore(e.target.value)}>
          {STORES.map(s=><option key={s}>{s}</option>)}
        </select>
      </div>

      {loading ? <div className="loading">Loading analytics…</div> : (<>
        <div className="stats-grid">
          <div className="stat-card">
            <div className="stat-label">Total Bottles Lost</div>
            <div className={`stat-value ${totalLoss>0?"red":""}`}>{totalLoss}</div>
            <div className="stat-sub">All time</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Est. Dollar Loss</div>
            <div className="stat-value red">${estDollar}</div>
            <div className="stat-sub">@ $12/bottle avg</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Avg Daily Loss</div>
            <div className="stat-value gold">{avgDaily}</div>
            <div className="stat-sub">Bottles/day</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Days Tracked</div>
            <div className="stat-value">{days}</div>
            <div className="stat-sub">With count records</div>
          </div>
        </div>

        <div className="charts-grid">
          <div className="card">
            <div className="card-header"><div className="card-title">Loss by Product</div></div>
            <div className="card-body">
              <div className="bar-chart">
                {byProduct.map(p=>(
                  <div key={p.id} className="bar-row">
                    <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"var(--gray-600)"}}>{p.name}</div>
                    <div className="bar-track"><div className="bar-fill red" style={{width:`${(p.loss/maxProd)*100}%`}} /></div>
                    <div className="bar-val">{p.loss}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div className="card">
            <div className="card-header"><div className="card-title">Loss by Shift</div></div>
            <div className="card-body">
              <div className="bar-chart">
                {byShift.map(s=>(
                  <div key={s.shift} className="bar-row">
                    <div style={{color:"var(--gray-600)"}}>{s.shift}</div>
                    <div className="bar-track"><div className="bar-fill" style={{width:`${(s.loss/maxShift)*100}%`}} /></div>
                    <div className="bar-val">{s.loss}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </>)}
    </div>
  );
}

// ── Multi-Store Tab ──────────────────────────────────────────────
function MultiStoreTab({ session }) {
  const [data,    setData]    = useState({});
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      setLoading(true);
      const all = await sbQuery(session.token, "shrink_counts", `?order=created_at.desc&limit=2000`);
      if (!Array.isArray(all)) { setLoading(false); return; }
      const grouped = {};
      for (const s of STORES) {
        const rows = all.filter(r=>r.store===s);
        const loss = rows.reduce((t,r)=>r.variance>0?t+r.variance:t, 0);
        const days = new Set(rows.map(r=>r.date)).size;
        grouped[s] = { loss, entries:rows.length, days, avg: days>0?(loss/days).toFixed(1):0 };
      }
      setData(grouped);
      setLoading(false);
    })();
  }, []);

  const sorted = STORES.map(s=>({store:s,...(data[s]||{})})).sort((a,b)=>(b.loss||0)-(a.loss||0));

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">Multi-Store Overview</div>
          <div className="page-sub">Compare shrink across all locations</div>
        </div>
      </div>
      {loading ? <div className="loading">Loading store data…</div> : (
        <div className="store-grid">
          {sorted.map(s=>(
            <div key={s.store} className="store-card">
              <div className="store-card-name">{s.store}</div>
              <div className="store-stat"><span>Total Bottles Lost</span><span className={`store-stat-val ${s.loss>0?"red":""}`}>{s.loss||0}</span></div>
              <div className="store-stat"><span>Avg Daily Loss</span><span className="store-stat-val">{s.avg||"0"}</span></div>
              <div className="store-stat"><span>Est. $ Loss</span><span className="store-stat-val red">${((s.loss||0)*12).toFixed(0)}</span></div>
              <div className="store-stat"><span>Count Entries</span><span className="store-stat-val">{s.entries||0}</span></div>
              <div className="store-stat"><span>Days Tracked</span><span className="store-stat-val">{s.days||0}</span></div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
