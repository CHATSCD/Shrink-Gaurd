<body>

<div class="container">

<h1>Shift Inventory Count</h1>

<div id="employeeSection">

<label>Store</label>
<input id="store">

<label>Location</label>
<input id="location">

<label>Product</label>
<input id="product">

<label>User</label>
<input id="user">

<label>Shift</label>
<select id="shift">
<option>Morning</option>
<option>Evening</option>
<option>Night</option>
</select>

<label>Beginning Count</label>
<input type="number" id="begin">

<label>Ending Count</label>
<input type="number" id="end">

<label>Variance</label>
<input id="variance" readonly>

<div id="alert" class="alert"></div>

<button onclick="saveCount()">Submit Count</button>

</div>


<h2>Manager Access</h2>

<input id="managerPass" placeholder="Manager Password">
<button onclick="managerLogin()">Open Dashboard</button>


<div id="managerSection" class="hidden">

<h2>Manager Dashboard</h2>

<button onclick="loadCounts()">Refresh Data</button>

<h3>Store Leaderboard</h3>
<table id="leaderboard">
<thead>
<tr>
<th>Store</th>
<th>Total Variance</th>
</tr>
</thead>
<tbody></tbody>
</table>


<h3>All Counts</h3>
<table id="table">

<thead>
<tr>
<th>Store</th>
<th>Location</th>
<th>Product</th>
<th>Shift</th>
<th>Begin</th>
<th>End</th>
<th>Variance</th>
<th>User</th>
<th>Time</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>


<script>

const SUPABASE_URL="https://ylfsqjbqhewpfiooytlg.supabase.co"

const SUPABASE_KEY="YOUR_ANON_KEY_HERE"

const supabase=window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

const beginInput=document.getElementById("begin")
const endInput=document.getElementById("end")
const varianceInput=document.getElementById("variance")
const alertBox=document.getElementById("alert")

beginInput.addEventListener("input",calcVariance)
endInput.addEventListener("input",calcVariance)

function calcVariance(){

let begin=parseInt(beginInput.value)||0
let end=parseInt(endInput.value)||0

let variance=end-begin

varianceInput.value=variance

if(Math.abs(variance)>=10){

alertBox.innerText="⚠ Variance exceeds allowed limit"

}else{

alertBox.innerText=""

}

}

async function saveCount(){

let record={

store:document.getElementById("store").value,
location:document.getElementById("location").value,
product:document.getElementById("product").value,
shift:document.getElementById("shift").value,
user_name:document.getElementById("user").value,
begin_count:parseInt(beginInput.value),
end_count:parseInt(endInput.value),
variance:parseInt(varianceInput.value)

}

const {error}=await supabase
.from("counts")
.insert([record])

if(error){

alert("Save failed")

}else{

alert("Count saved")

beginInput.value=""
endInput.value=""
varianceInput.value=""

}

}

function managerLogin(){

let pass=document.getElementById("managerPass").value

if(pass==="manager123"){

document.getElementById("managerSection").classList.remove("hidden")

loadCounts()

}else{

alert("Invalid password")

}

}

async function loadCounts(){

const {data,error}=await supabase
.from("counts")
.select("*")
.order("created_at",{ascending:false})

if(error){

console.log(error)
return

}

const tbody=document.querySelector("#table tbody")

tbody.innerHTML=""

let storeTotals={}

data.forEach(row=>{

let tr=document.createElement("tr")

tr.innerHTML=`

<td>${row.store}</td>
<td>${row.location}</td>
<td>${row.product}</td>
<td>${row.shift}</td>
<td>${row.begin_count}</td>
<td>${row.end_count}</td>
<td>${row.variance}</td>
<td>${row.user_name}</td>
<td>${new Date(row.created_at).toLocaleString()}</td>

`

tbody.appendChild(tr)

if(!storeTotals[row.store]){

storeTotals[row.store]=0

}

storeTotals[row.store]+=Math.abs(row.variance)

})

updateLeaderboard(storeTotals)

}

function updateLeaderboard(totals){

const board=document.querySelector("#leaderboard tbody")

board.innerHTML=""

let entries=Object.entries(totals)

entries.sort((a,b)=>a[1]-b[1])

entries.forEach(e=>{

let tr=document.createElement("tr")

tr.innerHTML=`

<td>${e[0]}</td>
<td>${e[1]}</td>

`

board.appendChild(tr)

})

}

setInterval(loadCounts,10000)

</script>

/* ---------------------------
VARIANCE ALERT
--------------------------- */

function checkVariance(v){

if(Math.abs(v) >= 10){

return "ALERT"

}else{

/* ---------------------------
SAVE COUNT TO SUPABASE
--------------------------- */

async function saveCount(record){

const { error } =
await supabase
.from("counts")
.insert([record])

if(error){

console.log("DB ERROR",error)

}

}

/* ---------------------------
SUBMIT COUNT WRAPPER
--------------------------- */

async function submitCount(data){

let variance =
data.end - data.begin

let status =
checkVariance(variance)

await saveCount({

store:data.store,
location:data.location,
product:data.product,
shift:data.shift,
begin_count:data.begin,
end_count:data.end,
variance:variance,
price:data.price,
status:status,
user_name:data.user

})

}

/* ---------------------------
LOAD MANAGER DATA
--------------------------- */

async function loadManagerCounts(){

let {data,error} =
await supabase
.from("counts")
.select("*")
.order("created_at",{ascending:false})

if(error){

console.log(error)
return

}

buildLeaderboard(data)

}

/* ---------------------------
STORE LEADERBOARD
--------------------------- */

function buildLeaderboard(rows){

let totals={}

rows.forEach(r=>{

if(!totals[r.store]){

totals[r.store]=0

}

totals[r.store]+=Math.abs(r.variance)

})

let list =
Object.entries(totals)
.sort((a,b)=>a[1]-b[1])

renderLeaderboard(list)

}

/* ---------------------------
RENDER LEADERBOARD
--------------------------- */

function renderLeaderboard(list){

let board =
document.getElementById("leaderboard")

if(!board) return

board.innerHTML=""

list.forEach(r=>{

let row =
document.createElement("div")

row.innerHTML =
r[0] + " : " + r[1]

board.appendChild(row)

})

}

/* ---------------------------
BLIND SHIFT FILTER
--------------------------- */

function filterByShift(rows,user){

if(user.role === "employee"){

return rows.filter(
r => r.shift === user.shift
)

}

return rows

}
