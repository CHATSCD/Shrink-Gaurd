<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shrink Guard v3</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body class="bg-gray-900 text-white p-6">

<h1 class="text-3xl font-bold text-center mb-6">
Shrink Guard v3
</h1>

<div class="max-w-md mx-auto bg-gray-800 p-6 rounded-xl">

<label class="block mb-1">Barcode</label>
<input id="barcode" class="w-full p-2 mb-3 text-black rounded"/>

<button onclick="startScanner()" class="bg-blue-500 w-full p-2 rounded mb-4">
Scan Barcode
</button>

<div id="reader" class="mb-4"></div>

<label class="block mb-1">Incoming Count</label>
<input id="incoming" type="number" class="w-full p-2 mb-3 text-black rounded"/>

<button onclick="saveIncoming()" class="bg-green-500 w-full p-2 rounded mb-4">
Save Incoming
</button>

<label class="block mb-1">Count Out</label>
<input id="countOut" type="number" class="w-full p-2 mb-3 text-black rounded"/>

<button onclick="submitCountOut()" class="bg-red-500 w-full p-2 rounded">
Submit Count Out
</button>

</div>

<script>

// SUPABASE CONNECTION

const SUPABASE_URL = "https://ylfsqjbqhewpfiooytlg.supabase.co"

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlsZnNxamJxaGV3cGZpb295dGxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NzQwODQsImV4cCI6MjA4ODM1MDA4NH0.Ssl5J6ktZIVtLd2cq8vH7PWdR4-yZwI5tt4PtXkVqWk"

const supabase = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)


// BARCODE SCANNER

function startScanner(){

const scanner = new Html5Qrcode("reader")

scanner.start(
{ facingMode: "environment" },
{
fps: 10,
qrbox: 250
},
(barcode) => {

document.getElementById("barcode").value = barcode

scanner.stop()

},
(error) => {
console.log(error)
}
)

}


// SAVE INCOMING

async function saveIncoming(){

const barcode = document.getElementById("barcode").value
const incoming = document.getElementById("incoming").value

if(!barcode || !incoming){

alert("Enter barcode and incoming count")
return

}

const { error } = await supabase
.from("counts")
.insert([
{
barcode: barcode,
incoming: incoming
}
])

if(error){

console.error(error)
alert("Error saving incoming")

}else{

alert("Incoming saved")

}

}


// SUBMIT COUNT OUT

async function submitCountOut(){

const barcode = document.getElementById("barcode").value
const countOut = document.getElementById("countOut").value

if(!barcode || !countOut){

alert("Enter barcode and count out")
return

}

const { data, error } = await supabase
.from("counts")
.select("*")
.eq("barcode", barcode)
.order("id",{ascending:false})
.limit(1)

if(error || !data.length){

alert("Item not found")
return

}

const incoming = data[0].incoming
const shrink = incoming - countOut

const { error: updateError } = await supabase
.from("counts")
.update({
count_out: countOut,
shrink: shrink
})
.eq("id", data[0].id)

if(updateError){

console.error(updateError)
alert("Error submitting count")

}else{

alert("Shrink recorded: " + shrink)

}

}

</script>

</body>
</html>
