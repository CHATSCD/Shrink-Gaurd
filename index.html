<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shrink Shield Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen text-white">

<div class="bg-slate-800 p-8 rounded-lg w-96">
<h1 class="text-2xl font-bold mb-6 text-center">Shrink Shield</h1>

<input id="userid" placeholder="User ID" class="w-full p-3 rounded text-black mb-4">
<input id="password" type="password" placeholder="Password" class="w-full p-3 rounded text-black mb-6">

<button onclick="login()" class="w-full bg-blue-600 p-3 rounded">Login</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="auth.js"></script>

</body>
</html>
